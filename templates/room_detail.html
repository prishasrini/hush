<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hush — Room</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f1a;
      color: #e0e0ff;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      border-bottom: 1px solid #1a1a2e;
    }
    .logo { color: #a78bfa; font-size: 1.1rem; letter-spacing: 4px; }
    .room-title { color: #c4b5fd; font-size: 0.85rem; letter-spacing: 1px; text-transform: capitalize; }
    .back { color: #555; text-decoration: none; font-size: 0.82rem; letter-spacing: 1px; }
    .back:hover { color: #a78bfa; }

    .messages-box {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
    }
    .msg {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.88rem;
      line-height: 1.5;
      align-self: flex-start;
      background: #1a1a2e;
      color: #c4b5fd;
      border-bottom-left-radius: 4px;
      animation: fadeIn 0.3s ease;
    }
    .msg.mine {
      align-self: flex-end;
      background: #2d2048;
      color: #e0e0ff;
      border-bottom-left-radius: 16px;
      border-bottom-right-radius: 4px;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

    .empty-state {
      text-align: center;
      color: #444;
      font-size: 0.85rem;
      margin-top: 40px;
      line-height: 1.7;
    }

    .input-area {
      padding: 16px 20px;
      border-top: 1px solid #1a1a2e;
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
    }
    .input-row { display: flex; gap: 10px; }
    textarea {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      border-radius: 14px;
      color: #e0e0ff;
      font-size: 0.9rem;
      padding: 12px 16px;
      resize: none;
      height: 48px;
      font-family: 'Segoe UI', sans-serif;
    }
    textarea::placeholder { color: #444; }
    textarea:focus { outline: none; border-color: #a78bfa; }
    .send-btn {
      background: #a78bfa;
      border: none;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      cursor: pointer;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #c4b5fd; }
    .room-note {
      font-size: 0.72rem;
      color: #444;
      text-align: center;
      margin-top: 8px;
    }
    .messages-box::-webkit-scrollbar { width: 4px; }
    .messages-box::-webkit-scrollbar-thumb { background: #2d2d4e; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="top">
    <span class="logo">hush.</span>
    <span class="room-title">{{ room_name.replace('-', ' ') }}</span>
    <a href="/rooms" class="back">← rooms</a>
  </div>

  <div class="messages-box" id="messages-box">
    <div class="empty-state" id="empty-state">no messages yet — be the first to share 🤍</div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="msg-input" placeholder="share what's on your mind..."
        onkeydown="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); sendMsg(); }"></textarea>
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
    <div class="room-note">fully anonymous · be kind</div>
  </div>

  <script>
    const roomName = "{{ room_name }}";
    const box = document.getElementById('messages-box');
    const input = document.getElementById('msg-input');
    let myUserId = null;

    async function getMyId() {
      const res = await fetch('/api/me');
      const data = await res.json();
      myUserId = data.user_id;
    }

    async function loadMessages() {
      const res = await fetch(`/api/rooms/${roomName}/messages`);
      const messages = await res.json();

      if (messages.length === 0) {
        box.innerHTML = '<div class="empty-state" id="empty-state">no messages yet — be the first to share 🤍</div>';
        return;
      }

      box.innerHTML = '';
      messages.forEach(m => {
        const div = document.createElement('div');
        div.className = m.user_id === myUserId ? 'msg mine' : 'msg';
        div.textContent = m.content;
        box.appendChild(div);
      });
      box.scrollTop = box.scrollHeight;
    }

    async function sendMsg() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';

      await fetch(`/api/rooms/${roomName}/send`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: text })
      });
      loadMessages();
    }

    getMyId();
    loadMessages();
    // poll for new messages every 3 seconds
    setInterval(loadMessages, 3000);
  </script>
</body>
</html>
