<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hush</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f1a;
      color: #e0e0ff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    h1 { font-size: 3rem; letter-spacing: 8px; color: #a78bfa; }
    p { text-align: center; color: #888; letter-spacing: 2px; margin-top: 12px; }
    .enter-btn {
      display: block;
      margin: 30px auto 0;
      text-align: center;
      color: #a78bfa;
      text-decoration: none;
      letter-spacing: 3px;
      font-size: 0.85rem;
      transition: color 0.2s;
    }
    .enter-btn:hover { color: #c4b5fd; }
  </style>
</head>
<body>
  <div>
    <h1>hush.</h1>
    <p>you are not alone.</p>
    <a href="/mood" class="enter-btn">enter</a>
  </div>
</body>
</html>
